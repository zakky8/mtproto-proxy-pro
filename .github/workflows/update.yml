name: Update proxies

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours
  workflow_dispatch:           # manual run button
  push:
    branches: [main]
    paths:                     # rebuild lists when the engine or sources change
      - "cmd/**"
      - "internal/**"
      - "sources.txt"
      - ".github/workflows/update.yml"

permissions:
  contents: write              # commit refreshed lists back to the repo

concurrency:
  group: update-proxies
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false   # no module dependencies (no go.sum) — nothing to cache

      - name: Cache GeoIP dataset
        uses: actions/cache@v4
        with:
          path: data
          key: geoip-dbip-country-v1

      - name: Build
        run: go build -o tgproxy ./cmd/tgproxy

      - name: Collect, verify & publish (+ in-country reachability testing)
        run: ./tgproxy --concurrency 250 --timeout 6s --reach --reach-sample 60

      - name: Refresh sitemap lastmod
        run: |
          today="$(date -u +%F)"
          sed -i -E "s#<lastmod>[^<]*</lastmod>#<lastmod>${today}</lastmod>#" docs/sitemap.xml

      - name: Commit refreshed lists
        run: |
          git config user.name  "mtproto-proxy-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            count="$(grep -c . all_proxies.txt || echo 0)"
            git commit -m "chore: refresh proxy list (${count} verified) [skip ci]"
            # The reach pass can take ~20 min; main may have advanced meanwhile.
            # Rebase onto the latest, preferring our freshly-generated data on any
            # conflict, and retry with backoff so a concurrent push can't fail the run.
            pushed=false
            for attempt in 1 2 3 4 5; do
              git fetch origin main
              if git rebase -X theirs origin/main; then
                if git push origin main; then pushed=true; echo "pushed on attempt ${attempt}"; break; fi
              else
                git rebase --abort || true
              fi
              echo "push attempt ${attempt} failed; retrying..."; sleep $((attempt * 5))
            done
            if [ "$pushed" != true ]; then echo "::error::could not push refreshed lists after retries"; exit 1; fi
          fi
