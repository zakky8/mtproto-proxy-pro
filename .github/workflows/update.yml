name: Update proxies

# Builds the verified proxy lists and DEPLOYS them straight to GitHub Pages as an
# artifact. The lists are never committed to git, so the high-entropy proxy secrets
# (public Telegram proxy parameters, not credentials) never enter the repository and
# secret scanners have nothing to flag. This also removes the auto-commit push that
# could race and fail.

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours
  workflow_dispatch: # manual run button
  push:
    branches: [main]
    paths: # redeploy when the engine, sources, or static site change
      - "cmd/**"
      - "internal/**"
      - "sources.txt"
      - "docs/**"
      - ".github/workflows/update.yml"

# No contents:write needed — nothing is committed back to the repo.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false # no module dependencies (no go.sum)

      - name: Cache GeoIP dataset
        uses: actions/cache@v4
        with:
          path: data
          key: geoip-dbip-country-v1

      - name: Restore uptime history
        uses: actions/cache@v4
        with:
          path: .state
          key: uptime-state-${{ github.run_id }}
          restore-keys: |
            uptime-state-

      - name: Build
        run: go build -o tgproxy ./cmd/tgproxy

      - name: Generate lists (+ in-country reachability)
        run: ./tgproxy --concurrency 250 --timeout 6s --reach --reach-sample 60 --out docs --docs docs

      - name: Refresh sitemap lastmod
        run: |
          today="$(date -u +%F)"
          sed -i -E "s#<lastmod>[^<]*</lastmod>#<lastmod>${today}</lastmod>#" docs/sitemap.xml

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
